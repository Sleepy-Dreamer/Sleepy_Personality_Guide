function getCombinedInsights(mbtiType, ennNum) {
  const mData = mbtiData[mbtiType];

  const isI = mbtiType[0] === "I", isN = mbtiType[1] === "N", isF = mbtiType[2] === "F", isP = mbtiType[3] === "P";
  const out = [];
  if (isI && [4,5,9].includes(ennNum)) out.push(["Doubly inward", `Both ${mbtiType} and Type ${ennNum} pull strongly inward. You likely have an exceptionally rich inner life and need more quiet alone-time than most people around you — a feature, not a flaw.`]);
  if (!isI && [3,7,8].includes(ennNum)) out.push(["Outward momentum", `Both ${mbtiType} and Type ${ennNum} are energized by the outside world — people, activity, results. You're built for engagement, though watch for getting worn out from over-extending.`]);
  if (isN && center === "head") out.push(["A busy mind", `${mbtiType}'s Intuition and Type ${ennNum}'s head-center orientation both live in ideas. You process deeply before acting, and your inner chatter rarely fully quiets.`]);
  if (isF && center === "heart") out.push(["A big heart", `${mbtiType}'s Feeling preference and Type ${ennNum}'s heart center both put emotion first. You navigate the world through feeling, and your bonds with others mean everything.`]);
  if (!isN && center === "body") out.push(["Grounded in the present", `${mbtiType}'s Sensing and Type ${ennNum}'s body-center orientation both anchor you in the now. You're practical, hands-on, and you trust what's right in front of you.`]);
  if (!isF && center === "head") out.push(["A natural problem-solver", `${mbtiType}'s Thinking and Type ${ennNum}'s head center both lean toward figuring things out. You're great at solving problems, though you may miss the feelings swirling underneath.`]);
  if ([2,9].includes(ennNum) && (isF || ["INFP","INFJ"].includes(mbtiType))) out.push(["A peacekeeping streak", `Both your types love keeping the peace. That makes you gentle and attuned — but watch the habit of tucking your own needs away just to avoid a fuss.`]);
  if ([1,3].includes(ennNum) && !isP) out.push(["Built for goals", `Your Judging preference and Type ${ennNum}'s drive make you wonderfully goal-oriented. You hold high standards and feel happiest when you're making real progress.`]);
  if (isN && [1,4,6].includes(ennNum)) out.push(["Values meet vision", `${mbtiType}'s Intuition and Type ${ennNum}'s convictions combine into someone driven by ideals. You're likely devoted to something bigger than yourself.`]);

  return out;
}

function buildQuiz(length) {
  const mPer = length === "long" ? 5 : 3;
  const ePer = length === "long" ? 4 : 2;
  const mbti = [];
  for (let r = 0; r < mPer; r++) for (const dim of ["EI","SN","TF","PJ"]) mbti.push({ dim, ...MBTI_BANK[dim][r] });

// ── Enneagram wheel (centers + connecting lines + type names) ──────────────────
const WHEEL = (() => {
  const W = 380, H = 344, cx = 190, cy = 160, ro = 100, ri = 62, numR = (ro + ri) / 2, lineR = ri - 2, labelR = ro + 16;
  const pt = (r, deg) => { const a = deg * Math.PI / 180; return [cx + r * Math.sin(a), cy - r * Math.cos(a)]; };
  const ang = (n) => (n % 9) * 40;
  const sector = (a0, a1) => {
    const [x0o,y0o]=pt(ro,a0),[x1o,y1o]=pt(ro,a1),[x1i,y1i]=pt(ri,a1),[x0i,y0i]=pt(ri,a0);
    return `M ${x0o.toFixed(2)} ${y0o.toFixed(2)} A ${ro} ${ro} 0 0 1 ${x1o.toFixed(2)} ${y1o.toFixed(2)} L ${x1i.toFixed(2)} ${y1i.toFixed(2)} A ${ri} ${ri} 0 0 0 ${x0i.toFixed(2)} ${y0i.toFixed(2)} Z`;
  };
  const segs = [1,2,3,4,5,6,7,8,9].map(n => {
    const c = ang(n); const [lx, ly] = pt(labelR, c);
    return { n, path: sector(c-19, c+19), num: pt(numR, c), label:[lx, ly], anchor: lx < cx-6 ? "end" : lx > cx+6 ? "start" : "middle" };
  });
  const linePt = {}; [1,2,3,4,5,6,7,8,9].forEach(n => linePt[n] = pt(lineR, ang(n)));
  return { W, H, segs, linePt };
})();
const segStyle = { 8:["body",1], 9:["body",0.82], 1:["body",0.66], 2:["heart",1], 3:["heart",0.82], 4:["heart",0.66], 5:["head",1], 6:["head",0.82], 7:["head",0.66] };

function EnneagramWheel({ core, emphasis }) {
  const cc = { body:centerInfo.body.col, heart:centerInfo.heart.col, head:centerInfo.head.col };
  const lp = WHEEL.linePt;
  const poly = (ns) => ns.map(n => `${lp[n][0].toFixed(2)},${lp[n][1].toFixed(2)}`).join(" ");
  const dyn = core ? ENN_DYNAMICS[core] : null;
  const emp = emphasis || core;
  const arrow = (to, color, active, sfx) => {
    const [x1,y1] = lp[core], [x2,y2] = lp[to];
    const sx = x1+(x2-x1)*0.08, sy = y1+(y2-y1)*0.08, ex = x1+(x2-x1)*0.84, ey = y1+(y2-y1)*0.84;
    return <line x1={sx.toFixed(2)} y1={sy.toFixed(2)} x2={ex.toFixed(2)} y2={ey.toFixed(2)} stroke={color} strokeWidth={active?3.4:1.8} strokeOpacity={active?1:0.3} strokeLinecap="round" markerEnd={`url(#arr-${sfx}${active?"":"-f"})`} />;
  };
  const empPt = emp ? WHEEL.segs[emp-1].num : null;
  const empCol = emp ? enneagramTypes[emp-1].col : C.cocoa;
  const head = (id, col, op) => (
    <marker id={id} viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="5.6" markerHeight="5.6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill={col} fillOpacity={op} /></marker>
  );
  return (
    <svg viewBox={`0 0 ${WHEEL.W} ${WHEEL.H}`} width="100%" style={{ maxWidth:380, display:"block", margin:"0 auto" }}>
      <defs>{head("arr-g",GROWTH_COL,1)}{head("arr-g-f",GROWTH_COL,0.3)}{head("arr-s",STRESS_COL,1)}{head("arr-s-f",STRESS_COL,0.3)}</defs>
      <polygon points={poly([3,6,9])} fill="none" stroke="rgba(95,66,49,0.18)" strokeWidth="1.4" strokeLinejoin="round" />
      <polygon points={poly([1,4,2,8,5,7])} fill="none" stroke="rgba(95,66,49,0.18)" strokeWidth="1.4" strokeLinejoin="round" />
      {dyn && arrow(dyn.growth, GROWTH_COL, emp === dyn.growth, "g")}
      {dyn && arrow(dyn.stress, STRESS_COL, emp === dyn.stress, "s")}
      {WHEEL.segs.map(s => {
        const [grp, op] = segStyle[s.n];
        const isEmp = s.n === emp, isCore = s.n === core;
        const t = enneagramTypes[s.n-1];
        const stroke = isEmp ? C.cocoaDeep : isCore ? C.cocoa : "#fff";
        return (
          <g key={s.n}>
            <path d={s.path} fill={cc[grp]} fillOpacity={isEmp?1:op} stroke={stroke} strokeWidth={isEmp?3.5:isCore?2.6:2} strokeLinejoin="round" />
            <text x={s.num[0]} y={s.num[1]} textAnchor="middle" dominantBaseline="central" fontFamily={FONT_DISP} fontWeight="800" fontSize={isEmp?18:14.5} fill="#fff">{s.n}</text>
            <text x={s.label[0]} y={s.label[1]} textAnchor={s.anchor} dominantBaseline="central" fontFamily={FONT_DISP} fontWeight={isEmp||isCore?800:700} fontSize={isEmp?12:10.5} fill={isEmp?C.cocoaDeep:isCore?C.cocoa:t.col}>{t.short}</text>
          </g>
        );
      })}

          <animate attributeName="r" values="13;19;13" dur="1.9s" repeatCount="indefinite" />
        </circle>
      )}

  );
}

// ── QUIZ FLOW (with short / long choice) ───────────────────────────────────────
function QuizFlow({ onHome, onDone }) {
  const [length, setLength] = useState(null);
  const [phase, setPhase] = useState("mbti");
  const [mi, setMi] = useState(0);
  const [ei, setEi] = useState(0);
  const [mbtiAns, setMbtiAns] = useState([]);
  const [ennAns, setEnnAns] = useState([]);

  // length chooser screen
  if (!length) {
    const opt = (title, desc, count, L, accent) => (
      <button onClick={() => { const { mbti, enn } = buildQuiz(L); setMbtiAns(Array(mbti.length).fill(null)); setEnnAns(Array(enn.length).fill(null)); setLength(L); }}
        style={{ flex:1, minWidth:230, background:surface, border:`2px solid ${accent}40`, borderRadius:24, padding:"24px 22px", cursor:"pointer", textAlign:"left", fontFamily:FONT_BODY, boxShadow:"0 8px 22px rgba(124,89,66,0.08)", transition:"transform 0.15s" }}
        onMouseEnter={e => e.currentTarget.style.transform="translateY(-3px)"} onMouseLeave={e => e.currentTarget.style.transform="translateY(0)"}>
        <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:6 }}>
          <Paw size={17} color={accent} />
          <span style={{ fontFamily:FONT_DISP, fontWeight:700, fontSize:18, color:C.cocoa }}>{title}</span>
        </div>
        <p style={{ margin:"0 0 10px", color:C.soft, fontSize:13.5, lineHeight:1.6, fontWeight:500 }}>{desc}</p>
        <span style={{ fontSize:12, fontWeight:700, color:accent, fontFamily:FONT_DISP }}>{count}</span>
      </button>
    );
    return (
      <div style={{ ...pageBg("50% 0%"), display:"flex", flexDirection:"column", alignItems:"center", padding:"28px 18px 64px" }}>
        <Fonts />
        <PatternBg />
        <div style={{ width:"100%", maxWidth:640, position:"relative", zIndex:1 }}>
          <div style={{ marginBottom:16 }}><HomeBtn onClick={onHome} /></div>
          <div style={{ ...FRAME, padding:"30px 26px 30px" }}>
            <div style={{ textAlign:"center", marginBottom:26 }}>
              <PawEmblem size={60} />
              <h1 style={{ fontSize:"clamp(24px,5vw,34px)", fontWeight:800, color:C.cocoa, margin:"10px 0 6px", fontFamily:FONT_DISP }}>Take the test</h1>
              <p style={{ color:C.soft, fontSize:14.5, margin:0, lineHeight:1.7, fontWeight:500 }}>Pick how thorough you'd like to be. Both cover MBTI and the Enneagram.</p>
            </div>
            <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
              {opt("Quick test", "A speedy read on your types — perfect for a first guess.", "About 30 questions · ~5 min", "short", C.clay)}
              {opt("In-depth test", "More questions per trait for a steadier, more confident result.", "About 56 questions · ~10 min", "long", C.caramel)}
            </div>
            <p style={{ marginTop:20, fontSize:12.5, color:C.soft, lineHeight:1.7, textAlign:"center", fontWeight:500 }}>
              Prefer a full official test? Try{" "}
              <a href="https://www.16personalities.com/free-personality-test" target="_blank" rel="noopener noreferrer" style={{ color:C.caramelDeep, fontWeight:700 }}>16Personalities</a>{" "}and the{" "}
              <a href="https://enneagram-personality.com/" target="_blank" rel="noopener noreferrer" style={{ color:C.caramelDeep, fontWeight:700 }}>Enneagram test</a>.
            </p>
          </div>
        </div>
      </div>
    );
  }

  const { mbti: AM, enn: AE, ePer } = buildQuiz(length);
  const total = AM.length + AE.length;
  const done = phase === "mbti" ? mi : AM.length + ei;
  const progress = Math.round((done / total) * 100);

  const finish = (ennArr) => {
    const dc = { EI:{E:0,I:0}, SN:{S:0,N:0}, TF:{T:0,F:0}, PJ:{P:0,J:0} };
    AM.forEach((q,i) => { const v = mbtiAns[i]; if (v) dc[q.dim][v]++; });
    const mbtiType = `${dc.EI.E>=dc.EI.I?"E":"I"}${dc.SN.S>=dc.SN.N?"S":"N"}${dc.TF.T>=dc.TF.F?"T":"F"}${dc.PJ.J>=dc.PJ.P?"J":"P"}`;
    const mbtiScores = { EI:{av:dc.EI.E,bv:dc.EI.I}, SN:{av:dc.SN.S,bv:dc.SN.N}, TF:{av:dc.TF.T,bv:dc.TF.F}, PJ:{av:dc.PJ.J,bv:dc.PJ.P} };
    const sum = {}; for (let n=1;n<=9;n++) sum[n]=0;
    AE.forEach((q,i) => { sum[q.enn] += (ennArr[i] || 0); });
    let top = 1; for (let n=2;n<=9;n++) if (sum[n] > sum[top]) top = n;
    const maxPer = ePer * 3;
    const ennScores = {}; for (let n=1;n<=9;n++) ennScores[n] = Math.round((sum[n]/maxPer)*100);
    const { prev, next } = enneagramTypes[top-1].wings;
    let wing = null; if (sum[prev] || sum[next]) wing = sum[prev] > sum[next] ? prev : next;
    onDone({ mbtiType, ennNum: top, wing, ennScores, mbtiScores });
  };

  const pickMbti = (val) => { const n=[...mbtiAns]; n[mi]=val; setMbtiAns(n); if (mi+1 < AM.length) setMi(mi+1); else setPhase("enn"); };
  const pickEnn = (val) => { const n=[...ennAns]; n[ei]=val; setEnnAns(n); if (ei+1 < AE.length) setEi(ei+1); else finish(n); };
  const back = () => {
    if (phase === "mbti") { if (mi>0) setMi(mi-1); else onHome(); }
    else { if (ei>0) setEi(ei-1); else { setPhase("mbti"); setMi(AM.length-1); } }
  };

  const q = phase === "mbti" ? AM[mi] : AE[ei];
  const partLabel = phase === "mbti" ? `Part 1 of 2 · MBTI · Question ${mi+1}/${AM.length}` : `Part 2 of 2 · Enneagram · Question ${ei+1}/${AE.length}`;

  return (
    <div style={{ ...pageBg("50% 0%"), display:"flex", flexDirection:"column", alignItems:"center", padding:"24px 18px 64px" }}>
      <Fonts />
      <PatternBg />
      <div style={{ width:"100%", maxWidth:600, position:"relative", zIndex:1 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <HomeBtn onClick={onHome} />
          <span style={{ fontSize:12.5, color:C.soft, fontWeight:700, fontFamily:FONT_DISP }}>{progress}% complete</span>
        </div>
        <div style={{ ...FRAME, padding:"24px 22px 22px" }}>
          <div style={{ height:10, background:C.tan, borderRadius:100, overflow:"hidden", marginBottom:22 }}>
            <div style={{ height:"100%", width:`${progress}%`, background:`linear-gradient(90deg,${C.caramel},${C.cocoa})`, borderRadius:100, transition:"width 0.3s" }} />
          </div>
          <div style={{ background:surface, borderRadius:24, padding:"26px 22px", border:`2px solid ${C.caramel}26`, boxShadow:"0 8px 22px rgba(124,89,66,0.07)" }}>
            <Label color={C.clayDeep}>{partLabel}</Label>
            <h2 style={{ margin:"4px 0 20px", fontWeight:700, fontSize:21, color:C.cocoa, fontFamily:FONT_DISP, lineHeight:1.35 }}>
              {phase === "mbti" ? q.q : q.text}
            </h2>
            {phase === "mbti" ? (
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {q.options.map(([label, val]) => {
                  const sel = mbtiAns[mi] === val;
                  return (
                    <button key={val} onClick={() => pickMbti(val)} style={{ padding:"18px 20px", borderRadius:18, cursor:"pointer", border: sel ? `2.5px solid ${C.caramel}` : `2px solid ${C.line}`, background: sel ? `${C.honey}26` : C.cream, textAlign:"left", fontFamily:FONT_BODY, fontSize:15, fontWeight:600, color:C.cocoa, lineHeight:1.5, transition:"all 0.15s" }}>

            )}

        </div>
      </div>
    </div>
  );
}

      </Card>

      <SectionTitle>Challenges & how to handle them</SectionTitle>
      {eData.pitfalls.map((p, i) => (
        <div key={i} style={{ background:surface, border:`2px solid ${C.honey}55`, borderRadius:20, padding:"18px 20px", marginBottom:12, boxShadow:"0 4px 12px rgba(124,89,66,0.05)" }}>
          <div style={{ display:"flex", gap:9, alignItems:"flex-start", marginBottom:8 }}>
            <span style={{ marginTop:3 }}><Paw size={14} color={C.honeyDeep} /></span>
            <span style={{ fontFamily:FONT_DISP, fontWeight:700, fontSize:15.5, color:C.cocoa }}>{p.c}</span>
          </div>
          <div style={{ paddingLeft:23, display:"flex", gap:8 }}>
            <span style={{ fontSize:11, fontWeight:800, color:C.clayDeep, letterSpacing:1, textTransform:"uppercase", flexShrink:0, marginTop:2 }}>Try&nbsp;this</span>
            <p style={{ margin:0, color:C.body, fontSize:13.5, lineHeight:1.75, fontWeight:500 }}>{p.f}</p>
          </div>
        </div>
      ))}

      <div style={{ marginTop:24, textAlign:"center", padding:"30px 24px", background:`linear-gradient(135deg,${C.clay}2e,${C.honey}24)`, borderRadius:26, border:`2px solid ${C.clay}44` }}>
        <PawEmblem size={50} />
        <div style={{ marginTop:12 }}><Label color={C.clayDeep}>A note from Sleepy</Label></div>
        <p style={{ color:C.cocoa, fontSize:15, lineHeight:1.9, fontStyle:"italic", maxWidth:520, margin:"0 auto", fontWeight:500 }}>
          "These types are friendly guides, not labels to box you in. Go gently — growth is a slow, kind process. You're always more than four letters and a number."
        </p>
      </div>
    </div>
  );
}

// ── RESULTS ─────────────────────────────────────────────────────────────────
function Results({ mbtiType, ennNum, wing, ennScores, mbtiScores, onReset }) {
  const [tab, setTab] = useState("profile");
  const mData = mbtiData[mbtiType];
  const eData = enneagramTypes[ennNum - 1];
  const tabs = [["profile","Profile"],["mbti","MBTI"],["enneagram","Enneagram"],["tips","Tips"]];
  const order = tabs.map(t => t[0]);
  const labelOf = (id) => tabs.find(t => t[0] === id)[1];
  const idx = order.indexOf(tab);
  const go = (id) => { setTab(id); if (typeof window !== "undefined") window.scrollTo({ top:0, behavior:"smooth" }); };

  return (
    <div style={{ ...pageBg("80% 0%"), padding:"24px 16px 56px" }}>
      <Fonts />
      <PatternBg />
      <div style={{ ...FRAME, position:"relative", zIndex:1, maxWidth:860, margin:"0 auto", padding:"8px 6px 20px", overflow:"hidden" }}>
      <header style={{ textAlign:"center", padding:"24px 24px 18px", position:"relative", zIndex:1 }}>
        <div style={{ position:"absolute", top:18, left:12 }}><HomeBtn onClick={onReset} label="← Start over" /></div>
        <PawEmblem size={56} />
        <h1 style={{ fontSize:"clamp(22px,4vw,38px)", fontWeight:800, margin:"10px 0 6px", color:C.cocoa, fontFamily:FONT_DISP }}>{mData.name} · {eData.name}</h1>
        <p style={{ color:C.soft, fontSize:14, margin:"0 0 16px", fontWeight:600 }}>{mData.tagline}</p>
        <div style={{ display:"flex", justifyContent:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ background:`linear-gradient(135deg,${C.caramel},${C.cocoa})`, color:"white", padding:"6px 18px", borderRadius:100, fontSize:13, fontWeight:700, fontFamily:FONT_DISP }}>{mbtiType}</span>
          <span style={{ background:`linear-gradient(135deg,${eData.col},${eData.col}cc)`, color:"white", padding:"6px 18px", borderRadius:100, fontSize:13, fontWeight:700, fontFamily:FONT_DISP }}>{wing ? `${ennNum}w${wing}` : `Type ${ennNum}`}</span>
        </div>
      </header>
      <nav style={{ display:"flex", justifyContent:"center", gap:7, padding:"6px 20px 14px", flexWrap:"wrap", position:"relative", zIndex:1 }}>
        {tabs.map(([id,label],i) => (
          <button key={id} onClick={() => go(id)} style={{ padding:"9px 18px", borderRadius:100, border: tab===id ? "none" : `2px solid ${C.line}`, background: tab===id ? `linear-gradient(135deg,${C.caramel},${C.cocoa})` : "white", color: tab===id ? "white" : C.soft, cursor:"pointer", fontSize:13.5, fontWeight:700, fontFamily:FONT_DISP, transition:"all 0.2s", boxShadow: tab===id ? `0 4px 12px ${C.caramel}40` : "none", display:"flex", alignItems:"center", gap:7 }}>
            <span style={{ width:18, height:18, borderRadius:"50%", background: tab===id ? "rgba(255,255,255,0.25)" : C.tan, color: tab===id ? "#fff" : C.soft, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:10.5 }}>{i+1}</span>
            {label}
          </button>
        ))}
      </nav>
      <main style={{ maxWidth:760, margin:"0 auto", padding:"14px 18px 24px", position:"relative", zIndex:1 }}>
        {tab==="profile"   && <ProfileTab mData={mData} eData={eData} mbtiType={mbtiType} ennNum={ennNum} wing={wing} go={go} />}
        {tab==="mbti"      && <MBTIDetailTab mData={mData} mbtiType={mbtiType} mbtiScores={mbtiScores} />}
        {tab==="enneagram" && <EnneagramDetailTab eData={eData} ennNum={ennNum} wing={wing} ennScores={ennScores} />}
        {tab==="tips"      && <TipsTab mData={mData} eData={eData} mbtiType={mbtiType} ennNum={ennNum} />}

        <div style={{ display:"flex", justifyContent:"space-between", gap:12, marginTop:26 }}>
          {idx > 0
            ? <button onClick={() => go(order[idx-1])} style={{ padding:"13px 22px", borderRadius:18, border:`2px solid ${C.line}`, background:"white", color:C.soft, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:FONT_DISP }}>← {labelOf(order[idx-1])}</button>
            : <span />}
          {idx < order.length - 1
            ? <button onClick={() => go(order[idx+1])} style={{ padding:"13px 26px", borderRadius:18, border:"none", background:`linear-gradient(135deg,${C.caramel},${C.cocoa})`, color:"white", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:FONT_DISP, boxShadow:`0 6px 16px ${C.caramel}55` }}>Next: {labelOf(order[idx+1])} →</button>
            : <button onClick={onReset} style={{ padding:"13px 26px", borderRadius:18, border:`2px solid ${C.caramel}`, background:"white", color:C.caramelDeep, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:FONT_DISP }}>↺ Start over</button>}
        </div>
      </main>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [mode, setMode] = useState(null); // null | 'manual' | 'quiz'
  const [result, setResult] = useState(null);

  if (result) return <Results {...result} onReset={() => { setResult(null); setMode(null); }} />;
  if (mode === "manual") return <Intro onHome={() => setMode(null)} onDone={setResult} />;
  if (mode === "quiz") return <QuizFlow onHome={() => setMode(null)} onDone={setResult} />;
  return <Landing onManual={() => setMode("manual")} onQuiz={() => setMode("quiz")} />;
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App />);
const _l = document.getElementById("loading");
if (_l) _l.remove();
</script>
</body>
</html>
